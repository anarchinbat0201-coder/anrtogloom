<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <button onclick="random()">Sanamsargui too</button>
    <h2 id="result"></h2>
    <input type="text" id="check">
    <button onclick="shalgah()">Shalgah</button>
    <button onclick="t0()">0</button>
    <button onclick="t1()">1</button>
    <button onclick="t2()">2</button>
    <button onclick="t3()">3</button>
    <button onclick="t4()">4</button>
    <button onclick="t5()">5</button>
    <button onclick="t6()">6</button>
    <button onclick="t7()">7</button>
    <button onclick="t8()">8</button>
    <button onclick="t9()">9</button>
    <script>
        let num=0;
        function random(){
            num=Math.floor(Math.random() * (20000-10000+1)) + 10000;
            document.getElementById("result").innerHTML = num;
            setTimeout(function(){
                document.getElementById("result").innerHTML = "";
            }, 50);
        }
        
        function shalgah(){
            if(Number(document.getElementById("check").value) ==num){
                alert("Zuv baina");
                document.getElementById("check").value = "";
            }
            else{
                alert("Buruu baina" + num);
                document.getElementById("check").value="";
            }
        }
        function t0(){
            document.getElementById("check").value +="0"
        }
        function t1(){
            document.getElementById("check").value +="1"
        }
        function t2(){
            document.getElementById("check").value +="2"
        }
        function t3(){
            document.getElementById("check").value +="3"
        }
        function t4(){
            document.getElementById("check").value +="4"
        }
        function t5(){
            document.getElementById("check").value +="5"
        }
        function t6(){
            document.getElementById("check").value +="6"
        }
        function t7(){
            document.getElementById("check").value +="7"
        }
        function t8(){
            document.getElementById("check").value +="8"
        }
        function t9(){
            document.getElementById("check").value +="9"
        }
    </script>
</body>
</html>
